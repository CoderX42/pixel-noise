<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"
    />
    <title>PixelNoise v2</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ========== DESIGN SYSTEM ========== */
      :root {
        /* 背景层 */
        --bg-stone: #c6c6c6;
        --bg-grass: #5c8c58;
        --bg-deep: #2c3e50;
        /* 方块/控件 */
        --oak: #8b7355;
        --diamond: #6b8e9f;
        --lava: #e8833a;
        --coal: #2d2d2d;
        /* 描边覆盖 */
        --highlight: rgba(255, 255, 255, 0.25);
        --shadow: rgba(0, 0, 0, 0.25);
        /* 动态引用 */
        --bg: var(--bg-stone);
        --text: var(--coal);
        --text-inv: #fff;
      }
      [data-theme="night"] {
        --bg: var(--bg-grass);
        --text: #e8e8d0;
        --text-inv: var(--coal);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        image-rendering: pixelated;
        image-rendering: -moz-crisp-edges;
        image-rendering: crisp-edges;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }
      body,
      html {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "VT323", monospace;
        font-size: 20px;
        color: var(--text);
        background: var(--bg);
        transition: background 0.4s steps(6);
      }

      /* ========== PIXEL BUTTON MIXIN ========== */
      .px-btn {
        background: var(--oak);
        border: 2px solid var(--coal);
        border-top-color: var(--coal);
        border-left-color: var(--coal);
        box-shadow:
          inset 0 1px 0 var(--highlight),
          inset 0 -2px 0 var(--shadow);
        color: #fff;
        cursor: pointer;
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition:
          transform 60ms steps(1),
          box-shadow 60ms steps(1);
      }
      .px-btn:active,
      .px-btn.pressed {
        transform: translateY(2px);
        box-shadow:
          inset 0 2px 0 var(--shadow),
          inset 0 -1px 0 var(--highlight);
      }
      .px-btn.selected {
        background: var(--diamond);
        box-shadow:
          inset 0 2px 0 var(--shadow),
          inset 0 -1px 0 var(--highlight);
      }
      .px-btn.accent {
        background: var(--lava);
      }
      .px-btn.accent:active {
        background: #d67a2e;
      }
      .px-btn:disabled {
        filter: grayscale(50%);
        opacity: 0.6;
        box-shadow: none;
        pointer-events: none;
      }

      /* ========== LAYOUT ========== */
      .app {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        position: relative;
        overflow: hidden;
      }

      /* --- 状态栏保留 --- */
      .status-spacer {
        height: max(env(safe-area-inset-top), 20px);
        flex-shrink: 0;
      }

      /* --- 标题栏 --- */
      .title-bar {
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        flex-shrink: 0;
        z-index: 20;
      }
      .logo {
        font-family: "Press Start 2P", monospace;
        font-size: 14px;
        color: var(--text);
        letter-spacing: 1px;
      }
      .menu-btn {
        width: 32px;
        height: 32px;
        font-size: 16px;
      }

      /* --- 视觉沉浸区 --- */
      .visual-zone {
        flex: 1;
        position: relative;
        min-height: 0;
      }
      #scene-canvas {
        width: 100%;
        height: 100%;
        display: block;
      }
      .play-float {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 64px;
        height: 64px;
        font-size: 24px;
        z-index: 15;
      }

      /* --- 声音选择网格 --- */
      .sound-strip {
        height: 120px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 16px;
        overflow-x: auto;
        overflow-y: hidden;
        scrollbar-width: none;
        z-index: 15;
        border-top: 2px solid var(--coal);
        background: rgba(0, 0, 0, 0.12);
      }
      .sound-strip::-webkit-scrollbar {
        display: none;
      }

      .sound-cell {
        width: 80px;
        height: 96px;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        position: relative;
        font-size: 14px;
      }
      .sound-cell canvas.cell-icon {
        width: 32px;
        height: 32px;
      }
      .sound-cell .cell-label {
        font-family: "VT323", monospace;
        font-size: 16px;
        text-align: center;
        background: rgba(0, 0, 0, 0.35);
        color: #fff;
        width: 100%;
        padding: 2px 0;
      }
      .sound-cell .check-mark {
        position: absolute;
        top: 4px;
        right: 4px;
        width: 12px;
        height: 12px;
        background: var(--diamond);
        border: 1px solid var(--coal);
        display: none;
        font-size: 9px;
        font-family: "Press Start 2P";
        line-height: 12px;
        text-align: center;
        color: #fff;
      }
      .sound-cell.selected .check-mark {
        display: block;
      }

      /* --- 底部控制区 --- */
      .ctrl-bar {
        height: 100px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 16px;
        padding: 8px 16px;
        border-top: 2px solid var(--coal);
        background: rgba(0, 0, 0, 0.15);
        z-index: 15;
      }

      .ctrl-play {
        width: 48px;
        height: 48px;
        font-size: 20px;
      }

      /* Pixel Slider */
      .slider-box {
        flex: 1;
        max-width: 280px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .slider-track {
        position: relative;
        width: 100%;
        height: 8px;
        background: var(--oak);
        border: 2px solid var(--coal);
        cursor: pointer;
      }
      .slider-fill {
        position: absolute;
        left: 0;
        top: 0;
        height: 100%;
        background: var(--diamond);
      }
      .slider-thumb {
        position: absolute;
        top: 50%;
        width: 16px;
        height: 24px;
        background: var(--diamond);
        border: 2px solid var(--coal);
        transform: translate(-50%, -50%);
        cursor: grab;
        box-shadow: inset 1px 0 0 rgba(255, 255, 255, 0.4);
      }
      .slider-thumb::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 3px;
        bottom: 3px;
        width: 2px;
        background: rgba(255, 255, 255, 0.5);
        transform: translateX(-50%);
      }
      .slider-thumb.active {
        background: var(--lava);
        width: 20px;
      }
      .vol-label {
        font-family: "VT323";
        font-size: 22px;
        min-width: 36px;
        text-align: right;
        color: var(--text);
      }

      .timer-btn {
        width: 48px;
        height: 48px;
        font-size: 12px;
        font-family: "VT323";
        line-height: 1.1;
      }
      .timer-btn span {
        font-size: 18px;
        display: block;
      }

      .theme-btn {
        width: 32px;
        height: 32px;
        font-size: 14px;
      }

      /* ========== 横屏沉浸模式 ========== */
      @media (orientation: landscape) and (max-height: 500px) {
        .title-bar {
          position: absolute;
          top: 0;
          left: 0;
          right: 0;
          z-index: 25;
          background: transparent;
        }
        .logo {
          font-size: 11px;
        }
        .visual-zone {
          position: absolute;
          inset: 0;
        }
        .sound-strip {
          display: none;
        }

        .ctrl-bar {
          position: absolute;
          bottom: 0;
          left: 0;
          right: 0;
          height: auto;
          min-height: 56px;
          padding: 8px 16px;
          background: rgba(0, 0, 0, 0.55);
          border-top: 2px solid var(--coal);
          transition: transform 0.3s steps(4);
        }
        .ctrl-bar.collapsed {
          transform: translateY(calc(100% - 28px));
        }
        .ctrl-bar.collapsed .ctrl-inner {
          opacity: 0;
          pointer-events: none;
        }
        .drawer-toggle {
          display: flex !important;
        }

        /* 侧边声音抽屉 */
        .side-drawer {
          display: flex !important;
          position: absolute;
          left: 0;
          top: 48px;
          bottom: 56px;
          width: 88px;
          background: rgba(0, 0, 0, 0.6);
          border-right: 2px solid var(--coal);
          flex-direction: column;
          gap: 8px;
          padding: 8px;
          overflow-y: auto;
          z-index: 20;
          transform: translateX(-100%);
          transition: transform 0.25s steps(4);
        }
        .side-drawer.open {
          transform: translateX(0);
        }
        .side-drawer .sound-cell {
          width: 72px;
          height: 76px;
        }
        .side-edge-hint {
          display: block !important;
          position: absolute;
          left: 0;
          top: 50%;
          transform: translateY(-50%);
          width: 8px;
          height: 80px;
          background: var(--diamond);
          border-right: 2px solid var(--coal);
          cursor: pointer;
          z-index: 19;
          writing-mode: vertical-rl;
          font-size: 12px;
          color: #fff;
          line-height: 8px;
          text-align: center;
          letter-spacing: 2px;
        }
      }

      .drawer-toggle {
        display: none;
        width: 100%;
        height: 24px;
        font-size: 14px;
        margin-bottom: 4px;
        border: none;
        background: transparent;
        color: #fff;
        cursor: pointer;
        font-family: "VT323";
      }
      .side-drawer {
        display: none;
      }
      .side-edge-hint {
        display: none;
      }

      /* ========== PIXEL 过渡遮罩 ========== */
      .transition-overlay {
        position: fixed;
        inset: 0;
        z-index: 100;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.05s;
      }
      .transition-overlay.active {
        opacity: 1;
        pointer-events: auto;
      }
      #transition-canvas {
        width: 100%;
        height: 100%;
      }

      /* ========== 汉堡菜单面板 ========== */
      .menu-panel {
        position: fixed;
        inset: 0;
        z-index: 90;
        background: rgba(0, 0, 0, 0.7);
        display: none;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 16px;
      }
      .menu-panel.open {
        display: flex;
      }
      .menu-panel .px-btn {
        width: 200px;
        height: 48px;
        font-family: "VT323";
        font-size: 22px;
      }
    </style>
  </head>
  <body>
    <div class="app" id="app">
      <div class="status-spacer"></div>

      <!-- 标题栏 -->
      <div class="title-bar">
        <div class="logo">PixelNoise</div>
        <div style="display: flex; gap: 8px; align-items: center">
          <button class="px-btn theme-btn" id="themeBtn">☀</button>
          <button class="px-btn menu-btn" id="menuBtn">≡</button>
        </div>
      </div>

      <!-- 像素场景 Canvas -->
      <div class="visual-zone">
        <canvas id="scene-canvas"></canvas>
        <button class="px-btn accent play-float" id="playFloat">▶</button>
      </div>

      <!-- 侧边抽屉 (仅横屏) -->
      <div class="side-edge-hint" id="sideHint">声音</div>
      <div class="side-drawer" id="sideDrawer"></div>

      <!-- 声音条 (竖屏) -->
      <div class="sound-strip" id="soundStrip"></div>

      <!-- 底部控制 -->
      <div class="ctrl-bar" id="ctrlBar">
        <div class="drawer-toggle" id="drawerToggle">▲ 展开</div>
        <div
          class="ctrl-inner"
          style="
            display: flex;
            align-items: center;
            gap: 16px;
            width: 100%;
            justify-content: center;
          "
        >
          <button class="px-btn ctrl-play" id="ctrlPlay">▶</button>
          <div class="slider-box">
            <span style="font-size: 16px">🔈</span>
            <div class="slider-track" id="sliderTrack">
              <div class="slider-fill" id="sliderFill"></div>
              <div class="slider-thumb" id="sliderThumb"></div>
            </div>
            <span class="vol-label" id="volLabel">50</span>
          </div>
          <button class="px-btn timer-btn" id="timerBtn">
            <span>⏰</span>30m
          </button>
        </div>
      </div>

      <!-- 像素溶解过渡 -->
      <div class="transition-overlay" id="transOverlay">
        <canvas id="transition-canvas"></canvas>
      </div>

      <!-- 汉堡菜单 -->
      <div class="menu-panel" id="menuPanel">
        <button class="px-btn" id="menuNight">🌙 夜间模式</button>
        <button class="px-btn" id="menuAbout">📖 关于</button>
        <button class="px-btn accent" id="menuClose">✕ 关闭</button>
      </div>
    </div>

    <script>
      // ===== 数据模型 =====
      const SOUNDS = [
        { id: "rain", name: "雨声", color: "#5B7FAA", particles: "rain" },
        { id: "wind", name: "风声", color: "#7A9B76", particles: "wind" },
        { id: "snow", name: "雪花", color: "#B0C4DE", particles: "snow" },
        { id: "fire", name: "篝火", color: "#A0522D", particles: "fire" },
        { id: "waves", name: "海浪", color: "#3C7A8A", particles: "waves" },
        { id: "noise", name: "纯噪", color: "#888", particles: "noise" },
      ];

      const ICONS = {
        rain: (c, s) => {
          c.fillStyle = "#5B7FAA";
          [
            [4, 2],
            [8, 6],
            [12, 10],
            [6, 8],
            [10, 4],
            [14, 12],
            [2, 12],
          ].forEach(([x, y]) => {
            c.fillRect(x, y, 2, 4);
          });
        },
        wind: (c, s) => {
          c.fillStyle = "#7A9B76";
          c.fillRect(2, 4, 10, 2);
          c.fillRect(4, 8, 10, 2);
          c.fillRect(2, 12, 8, 2);
        },
        snow: (c, s) => {
          c.fillStyle = "#B0C4DE";
          c.fillRect(6, 2, 4, 12);
          c.fillRect(2, 6, 12, 4);
          c.fillRect(4, 4, 2, 2);
          c.fillRect(10, 4, 2, 2);
          c.fillRect(4, 10, 2, 2);
          c.fillRect(10, 10, 2, 2);
        },
        fire: (c, s) => {
          c.fillStyle = "#E8833A";
          c.fillRect(4, 8, 8, 6);
          c.fillRect(6, 4, 4, 4);
          c.fillStyle = "#FFD700";
          c.fillRect(6, 6, 4, 4);
          c.fillRect(8, 2, 2, 4);
        },
        waves: (c, s) => {
          c.fillStyle = "#3C7A8A";
          [
            [0, 8],
            [2, 6],
            [4, 8],
            [6, 10],
            [8, 8],
            [10, 6],
            [12, 8],
            [14, 10],
          ].forEach(([x, y]) => {
            c.fillRect(x, y, 2, 2);
          });
          c.fillStyle = "#5BA0B0";
          [
            [0, 12],
            [2, 10],
            [4, 12],
            [6, 14],
            [8, 12],
            [10, 10],
            [12, 12],
          ].forEach(([x, y]) => {
            c.fillRect(x, y, 2, 2);
          });
        },
        noise: (c, s) => {
          for (let i = 0; i < 40; i++) {
            c.fillStyle = Math.random() > 0.5 ? "#AAA" : "#666";
            c.fillRect(
              Math.floor(Math.random() * 7) * 2,
              Math.floor(Math.random() * 7) * 2,
              2,
              2,
            );
          }
        },
      };

      const TIMER_OPTIONS = [0, 15, 30, 60];

      // ===== 持久化 =====
      const DB = {
        load() {
          try {
            return JSON.parse(localStorage.getItem("pxn2")) || {};
          } catch (e) {
            return {};
          }
        },
        save(d) {
          localStorage.setItem("pxn2", JSON.stringify(d));
        },
      };

      const saved = DB.load();
      const state = {
        sound: saved.sound || "rain",
        volume: saved.volume ?? 50,
        theme: saved.theme || "day",
        playing: false,
        timerIdx: 0,
        timerRemain: 0,
        drawerOpen: false,
        sideOpen: false,
      };

      // ===== 元素引用 =====
      const $ = (id) => document.getElementById(id);
      const el = {
        app: $("app"),
        canvas: $("scene-canvas"),
        playFloat: $("playFloat"),
        ctrlPlay: $("ctrlPlay"),
        strip: $("soundStrip"),
        side: $("sideDrawer"),
        sideHint: $("sideHint"),
        track: $("sliderTrack"),
        fill: $("sliderFill"),
        thumb: $("sliderThumb"),
        volLabel: $("volLabel"),
        themeBtn: $("themeBtn"),
        menuBtn: $("menuBtn"),
        menuPanel: $("menuPanel"),
        menuClose: $("menuClose"),
        menuNight: $("menuNight"),
        timerBtn: $("timerBtn"),
        drawerToggle: $("drawerToggle"),
        ctrlBar: $("ctrlBar"),
        transOverlay: $("transOverlay"),
        transCanvas: $("transition-canvas"),
      };
      const sCtx = el.canvas.getContext("2d", { alpha: false });

      // ===== Web Audio 引擎 =====
      const ACtx = window.AudioContext || window.webkitAudioContext;
      let actx,
        masterGain,
        nodes = [];

      function initAudio() {
        if (actx) return;
        actx = new ACtx();
        masterGain = actx.createGain();
        masterGain.connect(actx.destination);
        setVolume();
      }
      function setVolume() {
        if (!masterGain) return;
        masterGain.gain.setValueAtTime(
          Math.pow(state.volume / 100, 2),
          actx.currentTime,
        );
      }
      function stopAudio() {
        nodes.forEach((n) => {
          try {
            n.stop?.();
            n.disconnect?.();
          } catch (e) {}
        });
        nodes = [];
      }

      function makeBuffer(type) {
        const len = actx.sampleRate * 2,
          buf = actx.createBuffer(1, len, actx.sampleRate),
          d = buf.getChannelData(0);
        let prev = 0;
        for (let i = 0; i < len; i++) {
          const w = Math.random() * 2 - 1;
          if (type === "brown") {
            d[i] = (prev + 0.02 * w) / 1.02;
            prev = d[i];
            d[i] *= 3.5;
          } else if (type === "pink") {
            d[i] = w * 0.12;
          } else {
            d[i] = w * 0.45;
          }
        }
        return buf;
      }

      const synth = {
        rain() {
          const s = actx.createBufferSource();
          s.buffer = makeBuffer("pink");
          s.loop = true;
          const f = actx.createBiquadFilter();
          f.type = "lowpass";
          f.frequency.value = 900;
          s.connect(f);
          f.connect(masterGain);
          s.start();
          nodes.push(s, f);
        },
        wind() {
          const s = actx.createBufferSource();
          s.buffer = makeBuffer("pink");
          s.loop = true;
          const f = actx.createBiquadFilter();
          f.type = "bandpass";
          f.frequency.value = 400;
          f.Q.value = 0.7;
          s.connect(f);
          f.connect(masterGain);
          s.start();
          nodes.push(s, f);
        },
        snow() {
          const s = actx.createBufferSource();
          s.buffer = makeBuffer("pink");
          s.loop = true;
          const f = actx.createBiquadFilter();
          f.type = "lowpass";
          f.frequency.value = 500;
          const g = actx.createGain();
          g.gain.value = 0.6;
          s.connect(f);
          f.connect(g);
          g.connect(masterGain);
          s.start();
          nodes.push(s, f, g);
        },
        fire() {
          const s = actx.createBufferSource();
          s.buffer = makeBuffer("brown");
          s.loop = true;
          const f = actx.createBiquadFilter();
          f.type = "lowpass";
          f.frequency.value = 350;
          s.connect(f);
          f.connect(masterGain);
          s.start();
          nodes.push(s, f);
        },
        waves() {
          const s = actx.createBufferSource();
          s.buffer = makeBuffer("pink");
          s.loop = true;
          const f = actx.createBiquadFilter();
          f.type = "lowpass";
          f.frequency.value = 700;
          const lfo = actx.createOscillator();
          lfo.frequency.value = 0.08;
          const lg = actx.createGain();
          lg.gain.value = 500;
          lfo.connect(lg);
          lg.connect(f.frequency);
          s.connect(f);
          f.connect(masterGain);
          s.start();
          lfo.start();
          nodes.push(s, f, lfo, lg);
        },
        noise() {
          const s = actx.createBufferSource();
          s.buffer = makeBuffer("white");
          s.loop = true;
          s.connect(masterGain);
          s.start();
          nodes.push(s);
        },
      };

      function playSound() {
        initAudio();
        if (actx.state === "suspended") actx.resume();
        stopAudio();
        if (synth[state.sound]) synth[state.sound]();
      }

      // ===== 像素溶解过渡 =====
      function pixelDissolve(cb) {
        const tc = el.transCanvas,
          tx = tc.getContext("2d");
        const TW = 48,
          TH = 72;
        tc.width = TW;
        tc.height = TH;
        const cells = [];
        for (let y = 0; y < TH; y++)
          for (let x = 0; x < TW; x++) cells.push({ x, y, t: Math.random() });
        cells.sort((a, b) => a.t - b.t);
        el.transOverlay.classList.add("active");
        let idx = 0;
        const batch = Math.ceil(cells.length / 12);
        const step = () => {
          tx.fillStyle = state.theme === "night" ? "#2D2D2D" : "#C6C6C6";
          for (let i = 0; i < batch && idx < cells.length; i++, idx++) {
            tx.fillRect(cells[idx].x, cells[idx].y, 1, 1);
          }
          if (idx < cells.length) {
            requestAnimationFrame(step);
          } else {
            if (cb) cb();
            setTimeout(() => {
              let idx2 = 0;
              const step2 = () => {
                tx.clearRect(0, 0, TW, TH);
                // 反向清除
                idx2 += batch;
                const remaining = cells.slice(idx2);
                tx.fillStyle = state.theme === "night" ? "#2D2D2D" : "#C6C6C6";
                remaining.forEach((c) => tx.fillRect(c.x, c.y, 1, 1));
                if (idx2 < cells.length) {
                  requestAnimationFrame(step2);
                } else {
                  el.transOverlay.classList.remove("active");
                }
              };
              step2();
            }, 80);
          }
        };
        step();
      }

      // ===== 声音网格渲染 =====
      function drawCellIcon(canvas, id) {
        canvas.width = 16;
        canvas.height = 16;
        const c = canvas.getContext("2d");
        c.clearRect(0, 0, 16, 16);
        if (ICONS[id]) ICONS[id](c, 16);
      }

      function buildCells(container, landscape) {
        container.innerHTML = "";
        SOUNDS.forEach((s) => {
          const cell = document.createElement("button");
          cell.className =
            "px-btn sound-cell" + (state.sound === s.id ? " selected" : "");
          cell.dataset.id = s.id;
          const cv = document.createElement("canvas");
          cv.className = "cell-icon";
          drawCellIcon(cv, s.id);
          const lbl = document.createElement("div");
          lbl.className = "cell-label";
          lbl.textContent = s.name;
          const chk = document.createElement("div");
          chk.className = "check-mark";
          chk.textContent = "✓";
          cell.append(cv, lbl, chk);
          cell.onclick = () => selectSound(s.id);
          container.appendChild(cell);
        });
      }

      function selectSound(id) {
        pixelDissolve(() => {
          state.sound = id;
          save();
          refreshUI();
          if (state.playing) playSound();
        });
      }

      // ===== 音量滑块 =====
      function positionSlider() {
        const pct = state.volume / 100;
        el.fill.style.width = pct * 100 + "%";
        el.thumb.style.left = pct * 100 + "%";
        el.volLabel.textContent = state.volume;
      }

      let dragging = false;
      function sliderMove(clientX) {
        const rect = el.track.getBoundingClientRect();
        let pct = (clientX - rect.left) / rect.width;
        pct = Math.max(0, Math.min(1, pct));
        state.volume = Math.round(pct * 20) * 5; // step 5%
        setVolume();
        positionSlider();
        save();
      }

      el.track.addEventListener("pointerdown", (e) => {
        dragging = true;
        el.thumb.classList.add("active");
        sliderMove(e.clientX);
        e.preventDefault();
      });
      el.thumb.addEventListener("pointerdown", (e) => {
        dragging = true;
        el.thumb.classList.add("active");
        e.preventDefault();
      });
      document.addEventListener("pointermove", (e) => {
        if (dragging) sliderMove(e.clientX);
      });
      document.addEventListener("pointerup", () => {
        dragging = false;
        el.thumb.classList.remove("active");
      });

      // ===== 定时器 =====
      let timerInterval = null;
      function cycleTimer() {
        state.timerIdx = (state.timerIdx + 1) % TIMER_OPTIONS.length;
        const mins = TIMER_OPTIONS[state.timerIdx];
        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
        }
        if (mins > 0) {
          state.timerRemain = mins * 60;
          timerInterval = setInterval(() => {
            state.timerRemain--;
            updateTimerLabel();
            if (state.timerRemain <= 0) {
              clearInterval(timerInterval);
              timerInterval = null;
              togglePlay(false);
            }
          }, 1000);
        }
        updateTimerLabel();
      }
      function updateTimerLabel() {
        const m = TIMER_OPTIONS[state.timerIdx];
        el.timerBtn.innerHTML =
          m > 0 ? `<span>⏰</span>${m}m` : "<span>⏰</span>off";
      }

      // ===== 播放控制 =====
      function togglePlay(force) {
        state.playing = typeof force === "boolean" ? force : !state.playing;
        if (state.playing) playSound();
        else stopAudio();
        refreshUI();
        save();
      }

      el.playFloat.onclick = () => togglePlay();
      el.ctrlPlay.onclick = () => togglePlay();
      el.timerBtn.onclick = () => cycleTimer();

      // ===== 主题 & 菜单 =====
      el.themeBtn.onclick = () => {
        state.theme = state.theme === "day" ? "night" : "day";
        save();
        refreshUI();
      };
      el.menuBtn.onclick = () => el.menuPanel.classList.add("open");
      el.menuClose.onclick = () => el.menuPanel.classList.remove("open");
      $("menuAbout").onclick = () => {
        alert("PixelNoise v2\n像素风白噪音 🎮");
        el.menuPanel.classList.remove("open");
      };
      $("menuNight").onclick = () => {
        state.theme = state.theme === "day" ? "night" : "day";
        save();
        refreshUI();
        el.menuPanel.classList.remove("open");
      };

      // ===== 横屏抽屉 =====
      el.drawerToggle.onclick = () => {
        state.drawerOpen = !state.drawerOpen;
        el.ctrlBar.classList.toggle("collapsed", !state.drawerOpen);
        el.drawerToggle.textContent = state.drawerOpen ? "▼ 收起" : "▲ 展开";
      };
      el.sideHint.onclick = () => {
        state.sideOpen = !state.sideOpen;
        el.side.classList.toggle("open", state.sideOpen);
      };

      // ===== 状态同步 =====
      function save() {
        DB.save({
          sound: state.sound,
          volume: state.volume,
          theme: state.theme,
        });
      }

      function refreshUI() {
        document.body.setAttribute("data-theme", state.theme);
        el.themeBtn.textContent = state.theme === "day" ? "🌙" : "☀";
        $("menuNight").textContent =
          state.theme === "day" ? "🌙 夜间模式" : "☀ 日间模式";

        const playIcon = state.playing ? "⏸" : "▶";
        el.playFloat.textContent = playIcon;
        el.ctrlPlay.textContent = playIcon;
        el.playFloat.classList.toggle("pressed", state.playing);

        positionSlider();

        document.querySelectorAll(".sound-cell").forEach((c) => {
          c.classList.toggle("selected", c.dataset.id === state.sound);
        });
      }

      // ===== 像素场景引擎 =====
      const SW = 160,
        SH = 240;
      el.canvas.width = SW;
      el.canvas.height = SH;
      let particles = [],
        ripples = [];

      el.canvas.addEventListener("click", (e) => {
        const r = el.canvas.getBoundingClientRect();
        const sx = SW / r.width,
          sy = SH / r.height;
        ripples.push({
          x: (e.clientX - r.left) * sx,
          y: (e.clientY - r.top) * sy,
          size: 2,
          max: 30 + Math.random() * 20,
        });
        // 也尝试激活音频
        if (actx && actx.state === "suspended" && state.playing) actx.resume();
      });

      const SCENE_COLORS = {
        rain: { bg1: "#4A6670", bg2: "#3A5060", part: "#8AB4D0" },
        wind: { bg1: "#5C7A55", bg2: "#4A6648", part: "#A8C8A0" },
        snow: { bg1: "#8899AA", bg2: "#7788AA", part: "#E8E8F0" },
        fire: { bg1: "#4A3020", bg2: "#3A2518", part: "#FF8C3A" },
        waves: { bg1: "#2A5A6A", bg2: "#1A4858", part: "#6ABCD8" },
        noise: { bg1: "#555", bg2: "#444", part: "#BBB" },
      };

      let lastFrame = 0;
      function render(t) {
        requestAnimationFrame(render);
        if (t - lastFrame < 33) return; // ~30fps
        lastFrame = t;

        const sc = SCENE_COLORS[state.sound] || SCENE_COLORS.noise;
        const dark = state.theme === "night";

        // 渐变背景
        const bg1 = dark ? darken(sc.bg1, 0.4) : sc.bg1,
          bg2 = dark ? darken(sc.bg2, 0.4) : sc.bg2;
        // 简单 2 色背景
        sCtx.fillStyle = bg1;
        sCtx.fillRect(0, 0, SW, SH / 2);
        sCtx.fillStyle = bg2;
        sCtx.fillRect(0, SH / 2, SW, SH / 2);

        // 环境装饰 (地面/水面线)
        if (state.sound === "waves" || state.sound === "rain") {
          sCtx.fillStyle = dark ? "#1A3040" : "#3A6A80";
          sCtx.fillRect(0, SH * 0.75, SW, SH * 0.25);
        }
        if (state.sound === "fire") {
          sCtx.fillStyle = "#2A1A10";
          sCtx.fillRect(0, SH * 0.8, SW, SH * 0.2);
          // 篝火底座
          sCtx.fillStyle = "#5A3A20";
          sCtx.fillRect(SW / 2 - 12, SH * 0.75, 24, 8);
        }

        // 补充粒子
        while (particles.length < 50) {
          const p = {
            x: Math.random() * SW,
            life: 0,
            max: 60 + Math.random() * 60,
            type: state.sound,
          };
          switch (state.sound) {
            case "rain":
              p.y = 0;
              p.vx = 1;
              p.vy = 6;
              break;
            case "wind":
              p.y = Math.random() * SH;
              p.x = 0;
              p.vx = 3 + Math.random() * 2;
              p.vy = (Math.random() - 0.5) * 0.5;
              break;
            case "snow":
              p.y = 0;
              p.vx = Math.random() - 0.5;
              p.vy = 1 + Math.random();
              break;
            case "fire":
              p.y = SH * 0.75;
              p.x = SW / 2 + (Math.random() - 0.5) * 16;
              p.vx = (Math.random() - 0.5) * 0.5;
              p.vy = -1 - Math.random();
              break;
            case "waves":
              p.y = SH * 0.75;
              p.vx = 2;
              p.vy = Math.sin(p.x * 0.1) * 0.5;
              break;
            default:
              p.y = Math.random() * SH;
              p.vx = 0;
              p.vy = 0;
              break;
          }
          particles.push(p);
        }

        // 渲染粒子
        sCtx.fillStyle = sc.part;
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx;
          p.y += p.vy;
          p.life++;
          if (p.type === "fire") p.x += Math.sin(p.life * 0.15) * 0.8;
          if (p.type === "noise") {
            p.x = Math.random() * SW;
            p.y = Math.random() * SH;
          }
          if (p.type === "waves") p.vy = Math.sin((p.x + p.life) * 0.08) * 0.8;

          if (p.life > p.max || p.y > SH || p.y < 0 || p.x > SW || p.x < 0) {
            particles.splice(i, 1);
            continue;
          }
          const sz =
            p.type === "rain"
              ? 2
              : p.type === "snow"
                ? 4
                : p.type === "fire"
                  ? 4
                  : 2;
          sCtx.fillRect(
            Math.floor(p.x / 2) * 2,
            Math.floor(p.y / 2) * 2,
            sz,
            p.type === "rain" ? 4 : sz,
          );
        }

        // 涟漪
        sCtx.strokeStyle = dark ? "#DDD" : "#333";
        sCtx.lineWidth = 2;
        for (let i = ripples.length - 1; i >= 0; i--) {
          const r = ripples[i];
          r.size += 2;
          if (r.size > r.max) {
            ripples.splice(i, 1);
            continue;
          }
          sCtx.strokeRect(r.x - r.size, r.y - r.size, r.size * 2, r.size * 2);
        }
      }

      function darken(hex, amt) {
        let r = parseInt(hex.slice(1, 3), 16),
          g = parseInt(hex.slice(3, 5), 16),
          b = parseInt(hex.slice(5, 7), 16);
        r = Math.floor(r * (1 - amt));
        g = Math.floor(g * (1 - amt));
        b = Math.floor(b * (1 - amt));
        return `rgb(${r},${g},${b})`;
      }

      // ===== 启动 =====
      buildCells(el.strip, false);
      buildCells(el.side, true);
      refreshUI();
      updateTimerLabel();
      requestAnimationFrame(render);

      // 横屏时默认收起底栏
      const mql = window.matchMedia(
        "(orientation:landscape) and (max-height:500px)",
      );
      mql.addEventListener("change", (e) => {
        el.ctrlBar.classList.toggle(
          "collapsed",
          e.matches && !state.drawerOpen,
        );
        buildCells(el.side, true);
      });
      if (mql.matches) el.ctrlBar.classList.add("collapsed");
    </script>
  </body>
</html>
